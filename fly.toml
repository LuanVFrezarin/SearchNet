# Fly.io configuration for NetSuite Error Library Backend

app = "netsuite-errors"
primary_region = "gru"  # Guarulhos, São Paulo

[build]
dockerfile = "backend/Dockerfile"
ignorefile = "backend/.dockerignore"

[env]
PORT = "3001"

[[services]]
internal_port = 3001
protocol = "tcp"
processes = ["app"]

  [[services.ports]]
  port = 80
  handlers = ["http"]
  force_https = true

  [[services.ports]]
  port = 443
  handlers = ["tls", "http"]

  [services.tcp_checks]
  enabled = true
  grace_period = "10s"
  interval = "15s"
  timeout = "5s"

[[services.http_checks]]
path = "/health"
interval = 10000
timeout = 5000
grace_period = "30s"

[checks]
  [checks.status]
  port = 3001
  type = "http"
  interval = "30s"
  timeout = "5s"
  grace_period = "30s"
  method = "GET"
  path = "/health"

[[vm]]
memory = "512mb"
cpus = 1
