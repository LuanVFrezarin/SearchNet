version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: netsuite-errors-db
    environment:
      POSTGRES_USER: netsuite
      POSTGRES_PASSWORD: netsuite_pass
      POSTGRES_DB: netsuite_errors
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: netsuite-errors-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: netsuite-errors-search
    environment:
      MEILI_MASTER_KEY: 'netsuite_meili_key'
      MEILI_NO_ANALYTICS: 'true'
    ports:
      - '7700:7700'
    volumes:
      - meili_data:/meili_data

volumes:
  postgres_data:
  redis_data:
  meili_data:
